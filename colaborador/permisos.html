<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Permisos</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body>

<script type="module">

import { initLayout } from "../js/layout.js";
import { appUrl } from "../js/paths.js";
import { protectRoute } from "../js/router.js";
import { db } from "../js/firebase.js";
import { getSession } from "../js/auth.js";

import { collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* =========================
   SEGURIDAD
========================= */
protectRoute(["colaborador","admin"]);

/* =========================
   LAYOUT
========================= */
initLayout({ title:"Permisos" });

const app = document.getElementById("app");
const user = getSession();

let empleadoActual = null;

/* =========================
   INIT
========================= */
init();

async function init(){

  const empleados = await getEmpleados();

  empleadoActual = empleados.find(e =>
    String(e.nomina).trim() === String(user.nomina).trim()
  );

  render();
}

/* =========================
   UI
========================= */
function render(){

  app.innerHTML = `
    <div class="card">

      <h3>${user?.nombre || "Colaborador"}</h3>

      <label>Tipo</label>
      <select id="tipoPermiso">
        <option value="retardo">Retardo</option>
        <option value="falta">Falta</option>
      </select>

      <label>Goce de sueldo</label>
      <select id="goce">
        <option value="con_goce">Con goce</option>
        <option value="sin_goce">Sin goce</option>
      </select>

      <label>Fecha</label>
      <input type="date" id="fecha">

      <label>Motivo</label>
      <textarea id="motivo" placeholder="Describe el motivo"></textarea>

      <button id="btnGuardar" class="btn-primary">
        Enviar solicitud
      </button>

      <div id="loader" style="display:none; margin-top:10px;">
        ⏳ Enviando solicitud...
      </div>

    </div>
  `;

  document.getElementById("btnGuardar")
    .addEventListener("click", guardar);
}

/* =========================
   GUARDAR (CON LOADER 🔥)
========================= */
async function guardar(){

  const tipoPermiso = document.getElementById("tipoPermiso").value;
  const goce = document.getElementById("goce").value;
  const fecha = document.getElementById("fecha").value;
  const motivo = document.getElementById("motivo").value.trim();

  if(!fecha || !motivo){
    alert("Completa todos los campos");
    return;
  }

  const btn = document.getElementById("btnGuardar");
  const loader = document.getElementById("loader");

  // ✅ activar loader
  loader.style.display = "block";
  btn.disabled = true;
  btn.textContent = "Enviando...";

  try {

    await addDoc(collection(db,"solicitudes"),{

      tipo:"permiso",

      tipoPermiso, // 🔥 retardo/falta
      goce,        // 🔥 con/sin goce

      fecha,
      motivo,

      empleadoId: user.id,
      empleadoNombre: user.nombre,
      nomina: user.nomina,

      estado:"pendiente_jefe",

      // ✅ CLAVE
      jefeId: empleadoActual?.jefeId ?? null,

      fechaCreacion: new Date().toISOString()
    });

    // ✅ feedback
    loader.textContent = "✅ Permiso enviado correctamente";

    // ✅ limpiar formulario
    document.getElementById("fecha").value = "";
    document.getElementById("motivo").value = "";
    document.getElementById("tipoPermiso").selectedIndex = 0;
    document.getElementById("goce").selectedIndex = 0;

    // ✅ redirección elegante
    setTimeout(() => {
      window.location.href = appUrl("colaborador/dashboard.html");
    }, 800);

  } catch(e){

    console.error(e);

    alert("Error al guardar");

    loader.style.display = "none";
    btn.disabled = false;
    btn.textContent = "Enviar solicitud";
  }
}

/* =========================
   DATA
========================= */
async function getEmpleados(){

  const snap = await getDocs(collection(db,"empleados"));

  return snap.docs.map(d => ({
    id:d.id,
    ...d.data()
  }));
}

</script>

</body>
</html>
