<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Permisos</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body>

<script type="module">

import { initLayout } from "../js/layout.js";
import { appUrl } from "../js/paths.js";
import { protectRoute } from "../js/router.js";
import { db } from "../js/firebase.js";
import { getSession } from "../js/auth.js";

import { collection, addDoc }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* =========================
   SEGURIDAD
========================= */
protectRoute(["colaborador","admin"]);

/* =========================
   LAYOUT
========================= */
initLayout({ title: "Permisos" });

const app = document.getElementById("app");
const user = getSession();

/* =========================
   INIT
========================= */
init();

function init(){
  render();
}

/* =========================
   UI
========================= */
function render(){

  app.innerHTML = `
    <h2>Solicitar Permiso</h2>

    <div class="card">

      <h3>${user?.nombre || "Colaborador"}</h3>

      <label>Tipo de permiso</label>
      <select id="tipoPermiso">
        <option value="retardo">Retardo</option>
        <option value="falta">Falta</option>
      </select>

      <label>Fecha</label>
      <input type="date" id="fecha">

      <label>Motivo</label>
      <textarea id="motivo" placeholder="Describe el motivo"></textarea>

      <label>Justificación</label>
      <select id="justificacion">
        <option value="con_goce">Con goce de sueldo</option>
        <option value="sin_goce">Sin goce de sueldo</option>
      </select>

      <button class="btn-primary" onclick="guardar()">
        Enviar solicitud
      </button>

    </div>
  `;
}

/* =========================
   GUARDAR
========================= */
window.guardar = async () => {

  const tipoPermiso = document.getElementById("tipoPermiso").value;
  const fecha = document.getElementById("fecha").value;
  const motivo = document.getElementById("motivo").value.trim();
  const justificacion = document.getElementById("justificacion").value;

  if(!fecha || !motivo){
    alert("Completa todos los campos");
    return;
  }

  try {

    await addDoc(collection(db, "solicitudes"), {

      tipo: "permiso",

      empleadoId: user.id,
      empleadoNombre: user.nombre,

      tipoPermiso,
      fecha,
      motivo,
      justificacion,

      estado: "pendiente_jefe",
      jefeId: user.jefeId || null,

      fechaCreacion: new Date().toISOString()

    });

    alert("Permiso enviado ✅");

    window.location.href = appUrl("colaborador/dashboard.html");

  } catch(e){
    console.error(e);
    alert("Error al guardar");
  }
};

</script>

</body>
</html>
