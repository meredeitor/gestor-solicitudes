<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vales</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body>

<script type="module">

import { initLayout } from "../js/layout.js";
import { appUrl } from "../js/paths.js";
import { protectRoute } from "../js/router.js";
import { db } from "../js/firebase.js";
import { getSession } from "../js/auth.js";

import { collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* =========================
   SEGURIDAD
========================= */
protectRoute(["colaborador","admin"]);

/* =========================
   LAYOUT
========================= */
initLayout({ title: "Vales" });

const app = document.getElementById("app");
const user = getSession();

let empleadoActual = null;

/* =========================
   INIT
========================= */
init();

async function init(){

  const empleados = await getEmpleados();

  empleadoActual = empleados.find(e =>
    String(e.nomina).trim() === String(user.nomina).trim()
  );

  render();
}

/* =========================
   UI
========================= */
function render(){

  app.innerHTML = `
    <div class="card">

      <h3>${user.nombre}</h3>

      <label>Tipo</label>
      <select id="tipoVale">
        <option value="salida">Salida</option>
        <option value="entrada">Entrada</option>
      </select>

      <label>Tiempo autorizado</label>
      <select id="tiempo"></select>

      <label>Fecha</label>
      <input type="date" id="fecha">

      <label>Motivo</label>
      <textarea id="motivo" placeholder="Describe el motivo"></textarea>

      <button id="btnGuardar" class="btn-primary">
        Enviar solicitud
      </button>

      <div id="loader" style="display:none; margin-top:10px;">
        ⏳ Enviando solicitud...
      </div>

    </div>
  `;

  document.getElementById("tipoVale")
    .addEventListener("change", cambiarOpciones);

  document.getElementById("btnGuardar")
    .addEventListener("click", guardar);

  cambiarOpciones();
}

/* =========================
   OPCIONES DINÁMICAS
========================= */
function cambiarOpciones(){

  const tipo = document.getElementById("tipoVale").value;
  const select = document.getElementById("tiempo");

  if(!select) return;

  if(tipo === "salida"){
    select.innerHTML = `
      <option value="15min">Salida 15 min</option>
      <option value="30min">Salida 30 min</option>
      <option value="1hr">Salida 1 hora</option>
      <option value="sin_regreso">Salida sin regreso</option>
    `;
  }

  if(tipo === "entrada"){
    select.innerHTML = `
      <option value="entrada_815">Entrada posterior a 8:15 am</option>
    `;
  }
}

/* =========================
   GUARDAR (CON LOADER 🔥)
========================= */
async function guardar(){

  const tipoVale = document.getElementById("tipoVale").value;
  const tiempo = document.getElementById("tiempo").value;
  const fecha = document.getElementById("fecha").value;
  const motivo = document.getElementById("motivo").value.trim();

  if(!fecha || !motivo){
    alert("Completa todos los campos");
    return;
  }

  const btn = document.getElementById("btnGuardar");
  const loader = document.getElementById("loader");

  // ✅ activar loader
  loader.style.display = "block";
  btn.disabled = true;
  btn.textContent = "Enviando...";

  try {

    await addDoc(collection(db, "solicitudes"), {

      tipo: "vale",

      empleadoId: user.id,
      empleadoNombre: user.nombre,
      nomina: user.nomina,

      tipoVale,
      tiempo,
      fecha,
      motivo,

      estado: "pendiente_jefe",

      // ✅ CLAVE
      jefeId: empleadoActual?.jefeId ?? null,

      fechaCreacion: new Date().toISOString()

    });

    // ✅ feedback visual
    loader.textContent = "✅ Vale enviado correctamente";

    // ✅ limpiar inputs
    document.getElementById("fecha").value = "";
    document.getElementById("motivo").value = "";
    document.getElementById("tipoVale").selectedIndex = 0;

    cambiarOpciones();

    // ✅ redirección elegante
    setTimeout(() => {
      window.location.href = appUrl("colaborador/dashboard.html");
    }, 800);

  } catch(e){

    console.error(e);

    alert("Error al guardar");

    loader.style.display = "none";
    btn.disabled = false;
    btn.textContent = "Enviar solicitud";
  }
}

/* =========================
   DATA
========================= */
async function getEmpleados(){

  const snap = await getDocs(collection(db,"empleados"));

  return snap.docs.map(d => ({
    id:d.id,
    ...d.data()
  }));
}

</script>

</body>
</html>
