<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vacaciones</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body>

<script type="module">

import { initLayout } from "../js/layout.js";
import { appUrl } from "../js/paths.js";
import { protectRoute } from "../js/router.js";
import { db } from "../js/firebase.js";
import { getSession } from "../js/auth.js";

import { collection, getDocs, addDoc }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

protectRoute(["colaborador","admin"]);
initLayout({ title: "Vacaciones" });

const app = document.getElementById("app");
const user = getSession();

let dias = [];
let empleadoActual = null;

/* =========================
   INIT
========================= */
init();

async function init(){

  const empleados = await getEmpleados();

  empleadoActual = empleados.find(e =>
    String(e.nomina).trim() === String(user.nomina).trim()
  );

  render();
}

/* =========================
   UI
========================= */
function render(){

  app.innerHTML = `
    <div class="card">

      <h3>${user.nombre}</h3>

      <input type="date" id="fecha">
      <button id="btnAdd">+ Agregar</button>

      <ul id="lista"></ul>

      <p>Total: <strong id="total">0</strong> días</p>

      <button id="btnGuardar" class="btn-primary">
        Enviar solicitud
      </button>

      <div id="loader" style="display:none; margin-top:10px;">
        ⏳ Enviando solicitud...
      </div>

    </div>
  `;

  document.getElementById("btnAdd")
    .addEventListener("click", agregar);

  document.getElementById("btnGuardar")
    .addEventListener("click", guardar);
}

/* =========================
   AGREGAR FECHA
========================= */
function agregar(){

  const fecha = document.getElementById("fecha").value;

  if(!fecha){
    alert("Selecciona fecha");
    return;
  }

  if(dias.includes(fecha)){
    alert("Ya agregada");
    return;
  }

  dias.push(fecha);
  renderLista();

  document.getElementById("fecha").value = "";
}

/* =========================
   RENDER LISTA
========================= */
function renderLista(){

  document.getElementById("lista").innerHTML =
    dias.map(d => `<li>${d}</li>`).join("");

  document.getElementById("total").textContent = dias.length;
}

/* =========================
   GUARDAR (CON LOADER 🔥)
========================= */
async function guardar(){

  if(dias.length === 0){
    alert("Agrega fechas");
    return;
  }

  const btn = document.getElementById("btnGuardar");
  const loader = document.getElementById("loader");

  // ✅ activar loader
  loader.style.display = "block";
  btn.disabled = true;
  btn.textContent = "Enviando...";

  try {

    await addDoc(collection(db,"solicitudes"),{

      tipo:"vacaciones",

      empleadoId:user.id,
      empleadoNombre:user.nombre,
      nomina:user.nomina,

      dias,
      totalDias:dias.length,

      estado:"pendiente_jefe",

      jefeId: empleadoActual?.jefeId ?? null,

      fechaCreacion:new Date().toISOString()

    });

    // ✅ feedback inmediato
    loader.textContent = "✅ Enviado correctamente";

    // ✅ limpiar datos
    dias = [];
    renderLista();

    // ✅ redirigir elegante
    setTimeout(() => {
      window.location.href = appUrl("colaborador/dashboard.html");
    }, 800);

  } catch(e){

    console.error(e);

    alert("Error al enviar");

    loader.style.display = "none";
    btn.disabled = false;
    btn.textContent = "Enviar solicitud";
  }
}

/* =========================
   DATA
========================= */
async function getEmpleados(){

  const snap = await getDocs(collection(db,"empleados"));

  return snap.docs.map(d => ({
    id:d.id,
    ...d.data()
  }));
}

</script>

</body>
</html>
