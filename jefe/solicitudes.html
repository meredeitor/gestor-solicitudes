<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Aprobaciones</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body>

<script type="module">

import { initLayout } from "../js/layout.js";
import { protectRoute } from "../js/router.js";
import { db } from "../js/firebase.js";
import { getSession } from "../js/auth.js";

import { collection, getDocs, updateDoc, doc }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* =========================
   SEGURIDAD
========================= */
protectRoute(["jefe","admin"]);

/* =========================
   LAYOUT
========================= */
initLayout({ title: "Aprobaciones" });

const app = document.getElementById("app");
const user = getSession();

/* =========================
   INIT
========================= */
init();

async function init(){

  const solicitudes = await getSolicitudes();

  render(solicitudes);
}

/* =========================
   DATA
========================= */
async function getSolicitudes(){

  const snap = await getDocs(collection(db, "solicitudes"));

  return snap.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));
}

/* =========================
   RENDER
========================= */
function render(solicitudes){

  // ✅ SOLO DEL JEFE + PENDIENTES
  const lista = solicitudes.filter(s =>
    s.jefeId === user.id &&
    s.estado === "pendiente_jefe"
  );

  app.innerHTML = `
    <h2>Aprobaciones pendientes</h2>

    <div class="card">

      <div class="tabla">

        <div class="fila">
          <div class="col"><strong>Colaborador</strong></div>
          <div class="col"><strong>Tipo</strong></div>
          <div class="col"><strong>Detalle</strong></div>
          <div class="col"><strong>Acciones</strong></div>
        </div>

        ${lista.map(s => fila(s)).join("")}

      </div>

    </div>

    <div id="modal" class="modal hidden"></div>
  `;
}

/* =========================
   FILA
========================= */
function fila(s){

  return `
    <div class="fila">

      <div class="col">
        <strong>${s.empleadoNombre}</strong>
      </div>

      <div class="col">
        ${labelTipo(s)}
      </div>

      <div class="col">
        ${detalle(s)}
      </div>

      <div class="col acciones">
        <button onclick="verDetalle('${s.id}')">👁️</button>
        <button onclick="aprobar('${s.id}')">✅</button>
        <button onclick="rechazar('${s.id}')">❌</button>
      </div>

    </div>
  `;
}

/* =========================
   DETALLE
========================= */
function detalle(s){

  if(s.tipo === "vacaciones"){
    return `${s.totalDias} días`;
  }

  if(s.tipo === "permiso"){
    return formatFecha(s.fecha);
  }

  if(s.tipo === "vale"){
    return formatFecha(s.fecha);
  }

  return "-";
}

/* =========================
   TIPO
========================= */
function labelTipo(s){

  if(s.tipo === "vacaciones") return "Vacaciones";

  if(s.tipo === "permiso"){
    return s.tipoPermiso === "retardo" ? "Retardo" : "Falta";
  }

  if(s.tipo === "vale"){
    return s.tipoVale === "salida" ? "Salida" : "Entrada";
  }

  return s.tipo;
}

/* =========================
   MODAL DETALLE
========================= */
window.verDetalle = async (id) => {

  const solicitudes = await getSolicitudes();
  const s = solicitudes.find(x => x.id === id);

  if(!s) return;

  const modal = document.getElementById("modal");
  modal.classList.remove("hidden");

  modal.innerHTML = `
    <div class="modal-content">

      <div class="modal-header">
        <h3>Detalle</h3>
        <button onclick="cerrarModal()">✕</button>
      </div>

      <div class="modal-body">
        ${detalleModal(s)}
      </div>

      <div class="modal-footer">
        <button onclick="aprobar('${s.id}')">✅ Aprobar</button>
        <button onclick="rechazar('${s.id}')">❌ Rechazar</button>
      </div>

    </div>
  `;
};

/* =========================
   DETALLE MODAL
========================= */
function detalleModal(s){

  if(s.tipo === "vacaciones"){
    return `
      <p><strong>Días:</strong></p>
      <ul>
        ${s.dias.map(d => `<li>${formatFecha(d)}</li>`).join("")}
      </ul>
      <p>Total: ${s.totalDias}</p>
    `;
  }

  if(s.tipo === "permiso"){
    return `
      <p>Fecha: ${formatFecha(s.fecha)}</p>
      <p>Motivo: ${s.motivo}</p>
    `;
  }

  if(s.tipo === "vale"){
    return `
      <p>Fecha: ${formatFecha(s.fecha)}</p>
      <p>Tiempo: ${s.tiempo}</p>
      <p>Motivo: ${s.motivo}</p>
    `;
  }

  return "";
}

/* =========================
   ACCIONES
========================= */
window.aprobar = async (id) => {

  await updateDoc(doc(db, "solicitudes", id), {
    estado: "pendiente_rh"
  });

  cerrarModal();
  init();
};

window.rechazar = async (id) => {

  await updateDoc(doc(db, "solicitudes", id), {
    estado: "rechazado"
  });

  cerrarModal();
  init();
};

window.cerrarModal = () => {
  document.getElementById("modal").classList.add("hidden");
};

/* =========================
   UTIL
========================= */
function formatFecha(fecha){

  const d = new Date(fecha);

  return d.toLocaleDateString("es-MX", {
    day: "2-digit",
    month: "short"
  });
}

</script>

</body>
</html>
