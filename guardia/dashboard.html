<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Guardia</title>
   <link rel="stylesheet" href="../css/app.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body>

<script type="module">

import { initLayout } from "../js/layout.js";
import { protectRoute } from "../js/router.js";
import { db } from "../js/firebase.js";

import { collection, getDocs, updateDoc, doc }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

protectRoute(["guardia"]);
initLayout({ title: "Control de accesos" });

const app = document.getElementById("app");

init();

/* =========================
   INIT
========================= */
async function init(){
  await render();
}

/* =========================
   RENDER
========================= */
async function render(){

  const solicitudes = await getSolicitudes();

  const lista = solicitudes.filter(s =>
    s.estado === "aprobado" &&
    s.tipo === "vale"
  );

  app.innerHTML = `
    <h2>Control de salidas</h2>

    <div class="card">
      <div class="tabla">

        <div class="fila">
          <div class="col"><strong>Empleado</strong></div>
          <div class="col"><strong>Tipo</strong></div>
          <div class="col"><strong>Estado</strong></div>
          <div class="col"><strong>Control</strong></div>
          <div class="col"><strong>Acción</strong></div>
        </div>

        ${lista.map(s => fila(s)).join("")}

      </div>
    </div>

    <div id="modal" class="modal hidden"></div>
  `;

  setTimeout(() => {

    document.querySelectorAll(".btn-salida")
      .forEach(btn => {
        btn.onclick = () => marcarSalida(btn.dataset.id);
      });

    document.querySelectorAll(".btn-entrada")
      .forEach(btn => {
        btn.onclick = () => marcarEntrada(btn.dataset.id);
      });

    document.querySelectorAll(".btn-detalle")
      .forEach(btn => {
        btn.onclick = () => verDetalle(btn.dataset.id);
      });

  }, 0);
}

/* =========================
   FILA (ULTRA PRO)
========================= */
function fila(s){

  let estado = "Pendiente";

  if(s.horaSalida && !s.horaEntrada) estado = "Fuera";
  if(s.horaEntrada) estado = "Regresó";

  const salida = s.horaSalida ? formatHora(s.horaSalida) : "--";
  const entrada = s.horaEntrada ? formatHora(s.horaEntrada) : "--";

  let tiempo = "-";

  if(s.horaSalida && !s.horaEntrada){
    tiempo = "⏳ En curso";
  }

  if(s.tiempoFueraMin){
    tiempo = `${s.tiempoFueraMin} min`;
    if(s.tiempoFueraMin > 60){
      tiempo = `⚠️ ${s.tiempoFueraMin} min`;
    }
  }

  return `
    <div class="fila">

      <div class="col">${s.empleadoNombre}</div>

      <div class="col">
        ${s.tipoVale === "salida" ? "Salida" : "Entrada"}
      </div>

      <div class="col">${estado}</div>

      <!-- ✅ COLUMNA COMPACTA -->
      <div class="col">
        ${salida} → ${entrada}<br>
        <small>${tiempo}</small>
      </div>

      <div class="col acciones">

        <!-- 🔥 SALIDA NORMAL -->
        ${s.tipoVale === "salida" && !s.horaSalida ? `
          <button class="btn-salida" data-id="${s.id}">
            🚪
          </button>
        ` : ""}

        ${s.tipoVale === "salida" && s.horaSalida && !s.horaEntrada ? `
          <button class="btn-entrada" data-id="${s.id}">
            🔙
          </button>
        ` : ""}

        <!-- 🔥 ENTRADA TARDE -->
        ${s.tipoVale === "entrada" && !s.horaEntrada ? `
          <button class="btn-entrada" data-id="${s.id}">
            ✅
          </button>
        ` : ""}

        ${s.horaEntrada ? "✅" : ""}

        <button class="btn-detalle" data-id="${s.id}">
          👁️
        </button>

      </div>
    </div>
  `;
}

/* =========================
   SALIDA
========================= */
async function marcarSalida(id){

  await updateDoc(doc(db,"solicitudes",id),{
    horaSalida: new Date().toISOString()
  });

  render();
}

/* =========================
   ENTRADA
========================= */

/* =========================
   MODAL
========================= */
async function verDetalle(id){

  const solicitudes = await getSolicitudes();
  const s = solicitudes.find(x => x.id === id);

  const modal = document.getElementById("modal");
  modal.classList.remove("hidden");

  modal.innerHTML = `
    <div class="modal-content">
      <div class="modal-header">
        <h3>Detalle</h3>
        <button id="cerrarModal">✕</button>
      </div>

      <div class="modal-body">
        <p><strong>Empleado:</strong> ${s.empleadoNombre}</p>
        <p><strong>Tipo:</strong> ${s.tipoVale}</p>
        <p><strong>Motivo:</strong> ${s.motivo}</p>
        <p><strong>Tiempo:</strong> ${s.tiempoFueraMin || "-"} min</p>
      </div>
    </div>
  `;

  document.getElementById("cerrarModal")
    .onclick = () => modal.classList.add("hidden");
}

/* =========================
   UTIL
========================= */
function formatHora(fecha){
  const d = new Date(fecha);
  return d.toLocaleTimeString("es-MX", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

/* =========================
   DATA
========================= */
async function getSolicitudes(){
  const snap = await getDocs(collection(db,"solicitudes"));
  return snap.docs.map(d => ({
    id:d.id,
    ...d.data()
  }));
}

</script>

</body>
</html>
